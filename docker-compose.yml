services:
  backend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: backend
    build:
      context: ./backend
      dockerfile: ../commons/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/app.dev.sqlite
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./commons/backend/database.py:/app/src/app/database.py
      - ./commons/backend/background_jobs.py:/app/src/app/background_jobs.py
      - ./commons/backend/health.py:/app/src/app/health.py
      - ./commons/backend/cors.py:/app/src/app/cors.py
      - ./commons/backend/forger_desktop.py:/app/src/app/forger_desktop.py
      - ./commons/backend/forger_context.py:/app/src/app/forger_context.py
      - ./commons/backend/desktop_events.py:/app/src/app/desktop_events.py
      - ./commons/backend/desktop_task_jobs.py:/app/src/app/desktop_task_jobs.py
      - ./commons/backend/desktop_agent_jobs.py:/app/src/app/desktop_agent_jobs.py
      - ./commons/backend/realtime.py:/app/src/app/realtime.py

  frontend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: frontend
    build:
      context: ./frontend
      dockerfile: ../commons/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./commons/frontend/client.ts:/app/src/api/client.ts
      - ./commons/frontend/locale.ts:/app/src/api/locale.ts
      - ./commons/frontend/forgerBrand.ts:/app/src/api/forgerBrand.ts
      - ./commons/frontend/remoteTunnel.ts:/app/src/api/remoteTunnel.ts
    depends_on:
      - backend

volumes:
  frontend_node_modules:
